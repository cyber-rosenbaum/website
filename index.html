<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isometrische Pommesbude</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fdf6e3; font-family: 'Arial', sans-serif; }
        #ui {
            position: absolute;
            bottom: 50px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }
        .btn {
            background: #e63946;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.1); background: #ffbe0b; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 style="color: #e63946; text-transform: uppercase; letter-spacing: 5px;">Fritten-Fritz 3D</h1>
        <button class="btn" onclick="order()">EINE PORTION BITTE!</button>
    </div>

    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
          }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xfdf6e3);

        // Isometrische Kamera
        const aspect = window.innerWidth / window.innerHeight;
        const d = 5;
        const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
        
        // Positionierung für den typischen Jesse-Zhou-Winkel
        camera.position.set(10, 10, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Licht ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7.5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- Die Bude (Meshes) ---
        const group = new THREE.Group();

        // Hauptgebäude
        const shopGeo = new THREE.BoxGeometry(4, 3, 3);
        const shopMat = new THREE.MeshStandardMaterial({ color: 0xe63946 }); // Ketchup Rot
        const shop = new THREE.Mesh(shopGeo, shopMat);
        shop.castShadow = true;
        group.add(shop);

        // Dach (Flach)
        const roofGeo = new THREE.BoxGeometry(4.5, 0.2, 3.5);
        const roofMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const roof = new THREE.Mesh(roofGeo, roofMat);
        roof.position.y = 1.6;
        group.add(roof);

        // Fenster / Verkaufstresen
        const windowGeo = new THREE.BoxGeometry(2.5, 1.2, 0.1);
        const windowMat = new THREE.MeshStandardMaterial({ color: 0xa8dadc });
        const win = new THREE.Mesh(windowGeo, windowMat);
        win.position.set(0, 0.2, 1.51);
        group.add(win);

        // Bodenplatte
        const floorGeo = new THREE.PlaneGeometry(20, 20);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -1.5;
        floor.receiveShadow = true;
        scene.add(floor);

        scene.add(group);

        // --- Animation ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Sanfte Drehung bei Mausbewegung (optional)
            group.rotation.y += 0.002;
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

        // UI Logik
        window.order = () => {
            alert("🍟 Kommt sofort! Isometrisch serviert.");
        };
    </script>
</body>
</html>
