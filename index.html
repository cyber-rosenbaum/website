<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pommesbude №1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@400;700&family=Special+Elite&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; background:#1a1016; overflow:hidden; }
        #c { display:block; width:100vw; height:100vh; cursor:grab; }
        #c:active { cursor:grabbing; }
        #ui { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:2rem 2rem 1.5rem; }
        #headline { text-align:center; animation: rise 1.2s cubic-bezier(.16,1,.3,1) 0.4s both; }
        #headline h1 { font-family:'Cabin Sketch', cursive; font-size: clamp(2rem, 5vw, 3.5rem); color: #f5e6c8; letter-spacing: 0.04em; text-shadow: 3px 3px 0px #c45e2a, 6px 6px 0px rgba(0,0,0,0.3); line-height: 1; }
        #headline p { font-family:'Special Elite', cursive; font-size:0.75rem; letter-spacing:0.3em; color:rgba(245,230,200,0.45); text-transform:uppercase; margin-top:0.5rem; }
        #bottom { display:flex; flex-direction:column; align-items:center; gap:0.5rem; animation: rise 1s ease 2s both; }
        #hint { font-family:'Special Elite', cursive; font-size:0.65rem; letter-spacing:0.35em; text-transform:uppercase; color:rgba(245,230,200,0.3); animation: breathe 3s ease-in-out infinite 3s; }
        #tagline { font-family:'Special Elite', cursive; font-size:0.8rem; color:rgba(245,200,100,0.5); letter-spacing:0.12em; font-style:italic; }
        @keyframes rise { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        @keyframes breathe { 0%,100%{opacity:.3} 50%{opacity:.55} }
        #loader { position:fixed; inset:0; background:#1a1016; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; transition:opacity 0.8s ease; }
        #loader.done { opacity:0; pointer-events:none; }
        #loader-text { font-family:'Cabin Sketch',cursive; font-size:2rem; color:#f5c842; text-shadow:2px 2px 0 #c45e2a; margin-bottom:1.5rem; }
        #loader-bar-wrap { width:200px; height:4px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden; }
        #loader-bar { height:100%; background:#f5c842; width:0; transition:width 0.1s linear; border-radius:4px; }
        #loader-pct { font-family:'Special Elite',cursive; font-size:0.7rem; color:rgba(245,200,66,0.6); margin-top:0.8rem; letter-spacing:0.2em; }
    </style>
</head>
<body>
    <div id="loader">
        <div id="loader-text">Pommes werden frittiert…</div>
        <div id="loader-bar-wrap"><div id="loader-bar"></div></div>
        <div id="loader-pct">0%</div>
    </div>
    <canvas id="c"></canvas>
    <div id="ui">
        <div id="headline">
            <h1>Pommesbude №1</h1>
            <p>Frisch · Knusprig · Unschlagbar</p>
        </div>
        <div id="bottom">
            <div id="tagline">✦ Hausgemachte Soßen · Seit 1987 ✦</div>
            <div id="hint">Ziehen zum drehen &nbsp;·&nbsp; Scroll zum zoomen</div>
        </div>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// --- INITIALISIERUNG ---
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// WICHTIG: Korrektur für Farbraum
if (renderer.outputEncoding !== undefined) renderer.outputEncoding = THREE.sRGBEncoding;

renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1016);
scene.fog = new THREE.Fog(0x1a1016, 18, 32);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
let autoRotate = true; // Nach oben verschoben

// --- KAMERA STEUERUNG ---
let drag = false, px = 0, py = 0;
let theta = 0.3, phi = 1.1, radius = 10;
const lookAt = new THREE.Vector3(0, 1.5, 0);

function updateCamera() {
    camera.position.set(
        lookAt.x + radius * Math.sin(phi) * Math.sin(theta),
        lookAt.y + radius * Math.cos(phi),
        lookAt.z + radius * Math.sin(phi) * Math.cos(theta)
    );
    camera.lookAt(lookAt);
}

canvas.addEventListener('mousedown', e => { drag=true; px=e.clientX; py=e.clientY; autoRotate=false; });
canvas.addEventListener('touchstart', e => { drag=true; px=e.touches[0].clientX; py=e.touches[0].clientY; autoRotate=false; });
window.addEventListener('mouseup', () => drag=false);
window.addEventListener('touchend', () => drag=false);
window.addEventListener('mousemove', e => {
    if (!drag) return;
    theta -= (e.clientX-px)*0.006;
    phi = Math.max(0.4, Math.min(1.35, phi + (e.clientY-py)*0.005));
    px=e.clientX; py=e.clientY;
});
window.addEventListener('touchmove', e => {
    if (!drag) return;
    theta -= (e.touches[0].clientX-px)*0.006;
    phi = Math.max(0.4, Math.min(1.35, phi + (e.touches[0].clientY-py)*0.005));
    px=e.touches[0].clientX; py=e.touches[0].clientY;
});
canvas.addEventListener('wheel', e => {
    radius = Math.max(5, Math.min(18, radius + e.deltaY * 0.015));
    e.preventDefault();
}, {passive: false});

// --- MATERIAL HELFER ---
function m(color, opts={}) { return new THREE.MeshLambertMaterial({ color: new THREE.Color(color), ...opts }); }
function box(w,h,d) { return new THREE.BoxGeometry(w,h,d); }
function mesh(geo, mat) { 
    const o = new THREE.Mesh(geo, mat); 
    o.castShadow = true; o.receiveShadow = true; 
    return o; 
}
function add(parent, geo, mat, x, y, z, rx=0, ry=0, rz=0) {
    const o = mesh(geo, mat);
    o.position.set(x,y,z);
    o.rotation.set(rx,ry,rz);
    parent.add(o);
    return o;
}

const C = {
    wall: m(0xe8c88a), wall2: m(0xd4a96a), red: m(0xc0392b), redDark: m(0x8b1a10),
    yellow: m(0xf5c842), orange: m(0xe8762a), tan: m(0xc8956a), tanDark: m(0x8a5c34),
    dark: m(0x1a1016), grey: m(0x7a7068), greyLt: m(0xb0a898), white: m(0xf0ece0),
    green: m(0x4a8a3a), ground: m(0x2e2828), ground2: m(0x3a3430), skyBlue: m(0x5ab8d8),
    bulbOn: m(0xffeebb, {emissive: new THREE.Color(0xffcc44), emissiveIntensity:1.8}),
    glassW: m(0xc8e8f8, {transparent:true, opacity:0.35}),
    neon: m(0xff4422, {emissive: new THREE.Color(0xff4422), emissiveIntensity:2.0}),
    neon2: m(0xffcc00, {emissive: new THREE.Color(0xffcc00), emissiveIntensity:2.0}),
    awningStripe: m(0xf0ece0),
};

const root = new THREE.Group();
scene.add(root);

// BODEN
const gnd = mesh(new THREE.PlaneGeometry(20, 20), C.ground);
gnd.rotation.x = -Math.PI/2;
root.add(gnd);

// BUDE
const stall = new THREE.Group();
root.add(stall);
add(stall, box(5.6, 4.2, 0.22), C.wall, 0, 2.1, -1.5);
add(stall, box(0.22,4.2, 3.4), C.wall2, -2.7, 2.1, 0.2);
add(stall, box(0.22,4.2, 3.4), C.wall2, 2.7, 2.1, 0.2);

// TRESEN
add(stall, box(5.0, 0.16, 1.1), C.tan, 0, 1.35, 0.85);
add(stall, box(5.0, 1.2, 0.18), C.tanDark, 0, 0.75, 1.36);

// DACH & MARKISE
const roof = add(stall, box(6.2, 0.22, 3.8), C.red, 0, 4.3, -0.1);
const awn = add(stall, box(6.0, 0.14, 2.0), C.red, 0, 3.62, 1.7);
awn.rotation.x = -0.28;

for (let i=-2.5; i<=2.5; i+=0.7) {
    const s = add(stall, box(0.28, 0.16, 2.0), C.awningStripe, i, 3.63, 1.7);
    s.rotation.x = -0.28;
}

// GLÜHBIRNEN
const bulbMats = [];
for (let i=-2.6; i<=2.7; i+=0.5) {
    const mat = m(0xffeebb, {emissive: new THREE.Color(0xffcc44), emissiveIntensity:1.8});
    bulbMats.push(mat);
    add(stall, new THREE.SphereGeometry(0.08, 8, 8), mat, i, 3.06, 2.66);
}

// BELEUCHTUNG
scene.add(new THREE.AmbientLight(0x2a1820, 1.2));
const keyLight = new THREE.DirectionalLight(0xffeedd, 0.8);
keyLight.position.set(5, 10, 5);
keyLight.castShadow = true;
scene.add(keyLight);

const innerLight = new THREE.PointLight(0xff9944, 1.5, 6);
innerLight.position.set(0, 2.5, 0.5);
stall.add(innerLight);

// LADEBALKEN LOGIK
let pct = 0;
const loadInterval = setInterval(() => {
    pct += Math.random() * 15;
    if (pct >= 100) {
        pct=100;
        clearInterval(loadInterval);
        setTimeout(() => {
            document.getElementById('loader').classList.add('done');
        }, 500);
    }
    document.getElementById('loader-bar').style.width = pct+'%';
    document.getElementById('loader-pct').textContent = Math.floor(pct)+'%';
}, 100);

// ANIMATION LOOP
function animate() {
    requestAnimationFrame(animate);
    const t = performance.now() / 1000;
    
    if (autoRotate) theta += 0.002;
    
    // Blinkende Lichter
    const bp = Math.floor(t*2) % 3;
    bulbMats.forEach((bm, i) => {
        bm.emissiveIntensity = (i % 3 === bp) ? 2.5 : 0.5;
    });

    updateCamera();
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
